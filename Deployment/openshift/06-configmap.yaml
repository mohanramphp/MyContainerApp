apiVersion: v1
kind: ConfigMap
metadata:
  name: pizza-api-config
  namespace: mohanramphp-dev
  labels:
    app: pizza-api
    version: v1
data:
  # Logging configuration
  log-level: "From ConfigMap: Information"

  # API configuration
  api-name: "From ConfigMap: Pizza API"
  api-version: "From ConfigMap: 1.0.0"
  api-environment: "From ConfigMap: Production"

  # You can add more environment-specific configurations here
  # These values can be referenced in DeploymentConfig as environment variables
